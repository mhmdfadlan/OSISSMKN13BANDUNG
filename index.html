<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSIS SMKN 13 Bandung</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#050505;
    color:white;
}

/* HEADER */

header{
    background:#0d0d0d;
    border-bottom:2px solid #f5c400;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#f5c400;
    font-size:30px;
    font-weight:bold;
}

/* NAVBAR */

nav{
    display:flex;
    align-items:center;
    gap:25px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    color:#f5c400;
}

/* HERO */

.hero{
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:70px;
    color:#f5c400;
}

.hero p{
    margin-top:20px;
    font-size:20px;
    width:60%;
    line-height:1.8;
}

/* BUTTON */

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    background:#f5c400;
    color:black;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#ffd700;
    transform:scale(1.05);
}

/* FOOTER */

footer{
    text-align:center;
    padding:20px;
    border-top:2px solid #f5c400;
    line-height:1.8;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

    header{
        flex-direction:column;
        padding:20px;
        gap:15px;
    }

    .logo{
        font-size:24px;
        text-align:center;
    }

    nav{
        display:flex;
        justify-content:center;
        align-items:center;
        flex-wrap:wrap;
        gap:15px;
    }

    nav a{
        font-size:14px;
    }

    .hero{
        height:auto;
        min-height:80vh;
        padding:60px 20px;
    }

    .hero h1{
        font-size:38px;
        line-height:1.3;
    }

    .hero p{
        width:100%;
        font-size:16px;
        line-height:1.7;
    }

    button{
        width:100%;
        max-width:280px;
        font-size:15px;
    }

    footer{
        font-size:13px;
        padding:15px;
    }

}

</style>

</head>
<body>

<header>

<div class="logo">OSIS SMKN 13 BANDUNG</div>

</body>
</html>
